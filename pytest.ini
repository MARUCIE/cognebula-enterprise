[pytest]
markers =
    e2e: persona-journey scaffold tests (Contract-boundary until Kuzu snapshot ships — see test matrix Layer 5)
    integration_live: requires live Kuzu / external service; skipped by default
    fetch_returns: data-quality api_client fixture override (custom rows for test)
    fast: sub-second tier — run on every PR (legacy unit + api_client)
    standard: ~10s tier — run on merge to main (orchestration + corpus + golden + edge)
    nightly: ~30s+ tier — run via cron (mutation testing + property + matrix)
    perf: performance regression assertions (wall-clock budgets)
