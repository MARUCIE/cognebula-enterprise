services:
  cognebula-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cognebula-api
    ports:
      - "8400:8400"
    volumes:
      - ./data/finance-tax-graph:/app/data/finance-tax-graph
      - ./data/lancedb-build:/app/data/lancedb-build
    environment:
      - HOST=0.0.0.0
      - PORT=8400
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - KG_API_KEY=${KG_API_KEY}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8400/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
