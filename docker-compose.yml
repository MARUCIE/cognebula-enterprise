version: '3.8'

services:
  cognebula-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cognebula-api
    ports:
      - "8400:8400"
    volumes:
      # Mount data directories for KuzuDB and LanceDB persistence
      - ./data/finance-tax-graph:/data/finance-tax-graph
      - ./data/lancedb:/data/lancedb
    environment:
      - HOST=0.0.0.0
      - PORT=8400
      - DB_PATH=/data/finance-tax-graph
      - LANCE_PATH=/data/lancedb
    restart: unless-stopped
