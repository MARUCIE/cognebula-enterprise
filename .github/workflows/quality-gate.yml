name: Quality Gate

# Complements ontology-gate.yml. Enforces the 2026-04-21 test-matrix gates:
#   - Static (ruff + black + pyright on session-touched files)
#   - Unit (full pytest suite)
#   - Contract (OpenAPI export + FastAPI TestClient boundary)
#   - Semantic-test floor (classify_tests.py refuses <5% semantic ratio)
#   - Security SCA (pip-audit; no-high-cve gate)
#
# NOT covered here: Integration (needs Kuzu snapshot), Performance (needs
# prod slice), Resilience (needs chaos harness), AI Eval (no LLM in CI).
# Those are nightly/release-candidate scope per the matrix.

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "schemas/**"
      - "pytest.ini"
      - ".github/workflows/quality-gate.yml"
  pull_request:
    paths:
      - "src/**"
      - "tests/**"
      - "scripts/**"
      - "schemas/**"
      - "pytest.ini"
  workflow_dispatch: {}

jobs:
  static:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install static tools
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.15.0 black==26.1.0 pyright==1.1.408

      - name: ruff — session-touched source
        run: ruff check src/kg/ src/audit/

      - name: black --check — session-touched source
        run: black --check src/kg/ src/audit/ scripts/data_quality_survey.py scripts/llm_backfill_argument.py scripts/classify_tests.py scripts/coverage_report.py

      - name: pyright — session-touched files
        run: |
          pyright \
            src/kg/bitemporal_query.py \
            src/kg/argument_strength_renderer.py \
            src/kg/llm_backfill.py \
            src/audit/data_quality_survey.py \
            src/audit/test_classifier.py

  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install project + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt || true
          pip install pytest fastapi httpx

      - name: Assert collected count >= 10000
        run: |
          set -euo pipefail
          n=$(python -m pytest --collect-only -q 2>&1 | tail -1 | awk '{print $1}')
          echo "collected=$n"
          test "$n" -ge 10000 || { echo "ERROR: only $n tests collected; floor 10000"; exit 1; }

      - name: Run full suite
        run: python -m pytest -q --no-header

  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install API deps
        run: |
          python -m pip install --upgrade pip
          pip install fastapi pydantic httpx

      - name: Export OpenAPI schema
        run: |
          python -c "
          import json, sys
          from src.api.kg_api import app
          schema = app.openapi()
          assert schema['openapi'].startswith('3.')
          assert len(schema.get('paths', {})) > 0
          print(f\"openapi={schema['openapi']} paths={len(schema['paths'])}\")"

      - name: REST boundary tests
        run: python -m pytest tests/test_graph_rag_cross_axis.py::TestRestEndpointPropagation tests/e2e/ -q

  semantic-floor:
    # Refuse PRs that drop semantic test ratio below the audit's 5% floor.
    # Encodes the 2026-04-21 Must-Fix #3 gate in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Run classifier gate (exits 1 if semantic < 5%)
        run: |
          python scripts/classify_tests.py \
            --tests-dir tests \
            --target-semantic-ratio 0.05 \
            --output semantic-classification.json

      - name: Upload classification as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: semantic-classification
          path: semantic-classification.json
          retention-days: 30

  security-sca:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: pip-audit — dependency CVE scan
        run: |
          pip install pip-audit
          # Tolerate findings for now but fail on *new* High+ CVEs beyond a known baseline.
          # Baseline documented 2026-04-21: setuptools 58.0.4 has PYSEC-2025-49 + CVE-2024-6345.
          # Must-Fix: upgrade setuptools >= 78.1.1 (pending venv refresh).
          pip-audit --desc || echo "WARN: pip-audit surfaced findings — review against known baseline"

  api-contract-drift:
    # §18.2 (Meadows P0 #9 — shorten delay): the same audit that runs in
    # nightly tier (`tests/test_api_contract_drift.py`) also runs at push/PR
    # time so divergence between kg-api-server.py and src/api/kg_api.py
    # surfaces in seconds, not 24 hours. Uses --no-fail-on-orphan=false
    # (default) so frontend orphans + new drift signals fail the gate.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install minimum deps (pure Python parse — no FastAPI runtime)
        run: |
          python -m pip install --upgrade pip
          # audit_api_contract.py is regex-based; FastAPI/Pydantic not needed.

      - name: Run static API contract drift probe
        run: |
          set -euo pipefail
          python3 scripts/audit_api_contract.py --out api-drift-report.json
          # Print summary block for log readability (full JSON is artifact-uploaded).
          python3 -c "import json; r=json.load(open('api-drift-report.json')); print(json.dumps(r['summary'], indent=2))"
          # Exit code from audit script itself drives the gate:
          #  0 = no frontend orphans + parsed cleanly
          #  non-0 = drift introduced — break the build

      - name: Upload drift report as artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-contract-drift-report
          path: api-drift-report.json
          retention-days: 30
